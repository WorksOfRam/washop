    }
    application {
        modules = [ com.washop.ApplicationKt.module ]
    }
}

database {
    host = "localhost"
    host = ${?DB_HOST}
    port = 5432
    port = ${?DB_PORT}
    name = "washop"
    name = ${?DB_NAME}
    user = "ramakrishnasunkara"
    user = ${?DB_USER}
    password = ""
    password = ${?DB_PASSWORD}
}

redis {
    host = "localhost"
